app:
  node_id: coordinator
  coordinator: true
  storage: true
  coordinator_url: "http://coordinator:8080"
  node_address: "http://coordinator:8081"
  heartbeat_interval: "10m"
  api_request_timeout: "15s"
  file_transfer_timeout: "30m"

auth:
  jwt_secret: "change-me"
  node_secret: "change-me-node-secret"
  access_token_duration: "30m"
  refresh_token_duration: "8h"

http:
  address: ":8080"

database:
  driver: "sqlite"
  dsn: "dropoutbox.db"
  auto_migrate: true
#  driver: "postgres"
#  dsn: "host=localhost user=postgres password=postgres dbname=dropoutbox port=5432 sslmode=disable"
#  auto_migrate: true

seed:
  admin_name: admin
  admin_password: change-me
